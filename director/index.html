<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Director Portal — Resala AUC</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <script src="../spreadsheet-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, Helvetica, sans-serif; background: #f7f3ea; color: #172033; min-height: 100vh; }

    /* ── login screen ─────────────────────────────────────────────────── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }

    .login-card .logo { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 20px; display: block; }
    .login-card h1 { font-size: 22px; font-weight: bold; color: #0d2b45; margin-bottom: 4px; }
    .login-card .sub { font-size: 13px; color: #94a3b8; margin-bottom: 32px; line-height: 1.5; }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      text-align: left;
    }

    input[type="email"] {
      width: 100%;
      border: 1.5px solid #e6edf2;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      color: #172033;
      background: #f8fafc;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus { border-color: #0d2b45; background: #fff; }

    .btn {
      width: 100%;
      padding: 14px;
      background: #0d2b45;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.88; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
      text-align: left;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff50;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── dashboard ─────────────────────────────────────────────────────── */
    header {
      background: #0d2b45;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header img { width: 42px; height: 42px; border-radius: 50%; }
    header .htext h1 { font-size: 18px; font-weight: bold; }
    header .htext span { font-size: 12px; color: #f5c46b; }
    header .spacer { flex: 1; }

    .logout-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.22); }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    .page-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: #64748b;
    }

    .big-spinner {
      width: 40px; height: 40px;
      border: 3px solid #e6edf2;
      border-top-color: #0d2b45;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .summary-bar {
      background: #fff;
      border: 1px solid #eadfca;
      border-radius: 16px;
      padding: 16px 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .summary-bar .dept { font-size: 15px; font-weight: bold; color: #0d2b45; }
    .summary-bar .count { font-size: 13px; color: #94a3b8; }

    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filter-bar input[type="search"] {
      flex: 1;
      min-width: 200px;
      border: 1px solid #e6edf2;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      background: #fff;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed #eadfca;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    .applicant-list { display: flex; flex-direction: column; gap: 12px; }

    .applicant-card {
      background: #fff;
      border: 1px solid #eadfca;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .applicant-card:hover { box-shadow: 0 8px 22px rgba(13,43,69,0.08); border-color: #d8c9a3; }

    .ac-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .ac-name { font-size: 16px; font-weight: bold; color: #0d2b45; }
    .ac-email { font-size: 13px; color: #64748b; margin-top: 2px; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge.pref1 { background: #eaf6ec; color: #227a45; }
    .badge.pref2 { background: #fdf3e0; color: #a06a12; }

    .ac-meta {
      margin-top: 10px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #64748b;
    }
    .ac-meta strong { color: #172033; }

    /* ── modal ─────────────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,43,69,0.55);
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 16px;
      z-index: 50;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 18px;
      width: 100%;
      max-width: 720px;
      padding: 28px 28px 32px;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #eadfca;
      padding-bottom: 16px;
      margin-bottom: 18px;
    }
    .modal-head h2 { font-size: 19px; color: #0d2b45; }
    .modal-head .sub { font-size: 13px; color: #94a3b8; margin-top: 3px; }
    .modal-close {
      border: none;
      background: #f1f5f9;
      color: #64748b;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .modal-close:hover { background: #e2e8f0; }

    .section-title {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #94a3b8;
      margin: 20px 0 8px;
    }
    .section-title:first-of-type { margin-top: 0; }

    .qa-block { margin-bottom: 12px; }
    .qa-q { font-size: 13px; font-weight: bold; color: #172033; margin-bottom: 3px; }
    .qa-a { font-size: 14px; color: #475569; line-height: 1.55; white-space: pre-wrap; }

    .link-row a {
      display: inline-block;
      font-size: 13px;
      color: #0d2b45;
      font-weight: bold;
      margin-right: 16px;
      text-decoration: none;
    }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- login -->
  <div class="login-wrap" id="login-screen">
    <div class="login-card">
      <img class="logo"
        src="https://upnmxdgqdkvgzfwqaicb.supabase.co/storage/v1/object/public/resala-logo/Resala%20Logo%20-%20source.png"
        alt="Resala AUC" onerror="this.style.display='none'">
      <h1>Director Portal</h1>
      <p class="sub">Enter your AUC email to view applicants for your department who completed their interview and submitted their task.</p>

      <label for="email">AUC Email</label>
      <input type="email" id="email" placeholder="you@aucegypt.edu" autocomplete="email"
        onkeydown="if(event.key==='Enter') login()">

      <button class="btn" id="login-btn" onclick="login()">Enter Portal</button>
      <div class="error" id="login-error"></div>
    </div>
  </div>

  <!-- dashboard -->
  <div id="dashboard-screen" style="display:none;">
    <header>
      <img src="https://upnmxdgqdkvgzfwqaicb.supabase.co/storage/v1/object/public/resala-logo/Resala%20Logo%20-%20source.png"
        alt="Resala AUC" onerror="this.style.display='none'">
      <div class="htext">
        <h1>Director Portal</h1>
        <span id="header-role">—</span>
      </div>
      <div class="spacer"></div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </header>

    <div class="container">
      <div id="content-loading" class="page-loading">
        <div class="big-spinner"></div>
        <div>Loading applicants…</div>
      </div>

      <div id="content" style="display:none;">
        <div class="summary-bar">
          <div class="dept" id="summary-dept">—</div>
          <div class="count" id="summary-count">0 applicants</div>
        </div>

        <div class="filter-bar">
          <input type="search" id="search-input" placeholder="Search by name or email…" oninput="renderList()">
        </div>

        <div id="list-empty" class="empty-state" style="display:none;">
          No applicants yet who both completed an interview and submitted their task for this department.
        </div>

        <div class="applicant-list" id="applicant-list"></div>
      </div>
    </div>
  </div>

  <!-- modal -->
  <div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this) closeModal()">
    <div class="modal" id="modal-body"></div>
  </div>

  <script>
    const ENDPOINT = window.RESALA_APPLICATIONS_ENDPOINT || '';
    let applicants = [];
    let portalInfo = {};

    function escHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    function normalize(value) { return String(value ?? '').trim().toLowerCase(); }

    async function api(payload) {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || 'Something went wrong.');
      return data;
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const err = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      err.style.display = 'none';
      if (!email) { showLoginError('Enter your AUC email.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verifying…';

      try {
        const data = await api({ mode: 'director-load-applicants', email });
        sessionStorage.setItem('directorEmail', email);
        boot(data);
      } catch (e) {
        showLoginError(e.message || 'Could not connect.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enter Portal';
      }
    }

    function showLoginError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function logout() {
      sessionStorage.removeItem('directorEmail');
      document.getElementById('dashboard-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    function boot(data) {
      applicants = data.applicants || [];
      portalInfo = { department: data.department, positionType: data.positionType, directorName: data.directorName };

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      document.getElementById('content-loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      document.getElementById('header-role').textContent = `${portalInfo.positionType} · ${portalInfo.department}`;
      document.getElementById('summary-dept').textContent = `${portalInfo.department} applicants`;
      document.getElementById('summary-count').textContent =
        `${applicants.length} applicant${applicants.length === 1 ? '' : 's'} · interviewed + task submitted`;

      renderList();
    }

    function renderList() {
      const q = normalize(document.getElementById('search-input').value);
      const filtered = applicants.filter(a =>
        !q || normalize(a.fullName).includes(q) || normalize(a.aucEmail).includes(q)
      );

      const listEl = document.getElementById('applicant-list');
      const emptyEl = document.getElementById('list-empty');

      if (!filtered.length) {
        listEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      const sorted = [...filtered].sort((a, b) => a.fullName.localeCompare(b.fullName));

      listEl.innerHTML = sorted.map((a, i) => {
        const prefBadge = a.preferenceMatch === 1
          ? '<span class="badge pref1">1st preference</span>'
          : '<span class="badge pref2">2nd preference</span>';
        return `
          <div class="applicant-card" onclick="openModal(${i})" data-idx="${i}">
            <div class="ac-top">
              <div>
                <div class="ac-name">${escHtml(a.fullName)}</div>
                <div class="ac-email">${escHtml(a.aucEmail)}</div>
              </div>
              ${prefBadge}
            </div>
            <div class="ac-meta">
              <span><strong>${escHtml(a.major || '—')}</strong> · ${escHtml(a.yearLevel || '—')}</span>
              <span>${escHtml(a.phone || 'No phone')}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function openModal(idx) {
      const q = normalize(document.getElementById('search-input').value);
      const filtered = applicants.filter(a =>
        !q || normalize(a.fullName).includes(q) || normalize(a.aucEmail).includes(q)
      );
      const sorted = [...filtered].sort((a, b) => a.fullName.localeCompare(b.fullName));
      const a = sorted[idx];
      if (!a) return;

      const qa = (q, ans) => ans ? `
        <div class="qa-block">
          <div class="qa-q">${escHtml(q)}</div>
          <div class="qa-a">${escHtml(ans)}</div>
        </div>` : '';

      document.getElementById('modal-body').innerHTML = `
        <div class="modal-head">
          <div>
            <h2>${escHtml(a.fullName)}</h2>
            <div class="sub">${escHtml(a.aucEmail)} · ${escHtml(a.phone || 'No phone')} · ${escHtml(a.studentId || '')}</div>
          </div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>

        <div class="section-title">Application</div>
        <div class="ac-meta" style="margin-bottom:8px;">
          <span>1st preference: <strong>${escHtml(a.roleAppliedFor)}</strong></span>
          <span>2nd preference: <strong>${escHtml(a.secondPreference || '—')}</strong></span>
        </div>
        ${qa('Why this role?', a.whyThisRole)}
        ${qa('Why choose yourself?', a.whyChooseYourself)}
        ${qa('What do you hope to learn?', a.hopeToLearn)}
        ${qa('Previous Resala experience', a.previousResalaExperience)}

        <div class="section-title">Task Submission</div>
        <div class="link-row">
          ${a.firstPreferenceTaskLink ? `<a href="${escHtml(a.firstPreferenceTaskLink)}" target="_blank" rel="noopener">1st preference task/portfolio ↗</a>` : ''}
          ${a.secondPreferenceTaskLink ? `<a href="${escHtml(a.secondPreferenceTaskLink)}" target="_blank" rel="noopener">2nd preference task/portfolio ↗</a>` : ''}
        </div>
      `;

      document.getElementById('modal-backdrop').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
    }

    (function init() {
      const savedEmail = sessionStorage.getItem('directorEmail');
      if (!savedEmail) return;
      document.getElementById('email').value = savedEmail;
      api({ mode: 'director-load-applicants', email: savedEmail })
        .then(boot)
        .catch(() => sessionStorage.removeItem('directorEmail'));
    })();
  </script>
</body>
</html>
