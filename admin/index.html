<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — Resala AUC</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0d2b45;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: bold;
      color: #0d2b45;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      text-align: left;
    }

    input[type="password"] {
      width: 100%;
      border: 1.5px solid #e6edf2;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      color: #172033;
      background: #f8fafc;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus { border-color: #0d2b45; background: #fff; }

    .btn {
      width: 100%;
      padding: 14px;
      background: #0d2b45;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.88; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff50;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://upnmxdgqdkvgzfwqaicb.supabase.co/storage/v1/object/public/resala-logo/Resala%20Logo%20-%20source.png"
      alt="Resala AUC"
      onerror="this.style.display='none'">
    <h1>Resala AUC Admin</h1>
    <p class="sub">Enter the admin secret to continue</p>

    <label for="secret">Admin Secret</label>
    <input type="password" id="secret" placeholder="••••••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') login()">

    <button class="btn" id="btn" onclick="login()">Enter Dashboard</button>
    <div class="error" id="error"></div>
  </div>

  <script src="../spreadsheet-config.js"></script>
  <script>
    const ENDPOINT = window.RESALA_APPLICATIONS_ENDPOINT || '';

    async function login() {
      const secret = document.getElementById('secret').value.trim();
      const err = document.getElementById('error');
      const btn = document.getElementById('btn');

      err.style.display = 'none';
      if (!secret) { showError('Enter the admin secret.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verifying…';

      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8', 'x-admin-reset-secret': secret },
          body: JSON.stringify({ mode: 'admin-load' })
        });
        const data = await res.json();
        if (!res.ok || data.ok === false) throw new Error(data.error || 'Wrong secret.');

        sessionStorage.setItem('adminSecret', secret);
        sessionStorage.setItem('adminLoadCache', JSON.stringify(data));
        window.location.href = 'dashboard.html';
      } catch (e) {
        showError(e.message || 'Could not connect.');
        btn.disabled = false;
        btn.textContent = 'Enter Dashboard';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
