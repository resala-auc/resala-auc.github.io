<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard — Resala AUC</title>
  <script src="../spreadsheet-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, Helvetica, sans-serif; background: #f7f3ea; color: #172033; min-height: 100vh; }

    header {
      background: #0d2b45;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header img { width: 42px; height: 42px; border-radius: 50%; }
    header .htext h1 { font-size: 18px; font-weight: bold; }
    header .htext span { font-size: 12px; color: #f5c46b; }
    header .spacer { flex: 1; }

    .logout-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.22); }

    .container { max-width: 1200px; margin: 0 auto; padding: 28px 16px; }

    /* global loading */
    .page-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: #64748b;
    }

    .big-spinner {
      width: 40px; height: 40px;
      border: 3px solid #e6edf2;
      border-top-color: #0d2b45;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* tabs */
    .tabs {
      display: flex;
      gap: 0;
      background: #fff;
      border: 1px solid #eadfca;
      border-radius: 14px;
      padding: 6px;
      margin-bottom: 24px;
      width: fit-content;
    }

    .tab-btn {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      transition: all 0.15s;
    }

    .tab-btn.active { background: #0d2b45; color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* cards / tables */
    .card {
      background: #fff;
      border: 1px solid #eadfca;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .card-head {
      padding: 18px 24px;
      border-bottom: 1px solid #eadfca;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-head h2 { font-size: 16px; font-weight: bold; color: #0d2b45; }
    .card-head .count { font-size: 13px; color: #94a3b8; }

    .filter-bar {
      padding: 12px 24px;
      border-bottom: 1px solid #eadfca;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar input {
      border: 1px solid #e6edf2;
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 13px;
      color: #172033;
      background: #f8fafc;
      outline: none;
      max-width: 280px;
      width: 100%;
    }

    .filter-bar input:focus { border-color: #0d2b45; background: #fff; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }

    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: bold;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      background: #f8fafc;
      border-bottom: 1px solid #e6edf2;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #f0ede8; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf9f7; }
    tbody td { padding: 14px 16px; vertical-align: top; }

    .name { font-weight: bold; font-size: 14px; }
    .meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .role-main { font-size: 13px; font-weight: bold; color: #0d2b45; }
    .role-second { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    .slot-badge {
      display: inline-block;
      background: #fff7e8;
      border: 1px solid #f0d7a5;
      color: #8a4706;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: bold;
    }

    .meet-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      margin-top: 6px;
    }

    .meet-btn:hover { opacity: 0.88; }
    .meet-btn.no-link { background: #e2e8f0; color: #94a3b8; cursor: default; pointer-events: none; }

    .view-btn {
      display: inline-block;
      background: #f1f5f9;
      color: #0d2b45;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .view-btn:hover { background: #e2e8f0; }

    .btn {
      display: inline-block;
      padding: 9px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.88; }
    .btn-primary { background: #0d2b45; color: #fff; }
    .btn-accent  { background: #f5c46b; color: #0d2b45; }
    .btn-sm      { padding: 6px 13px; font-size: 12px; }

    .status-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }

    .status-pending  { background: #fef9c3; color: #854d0e; }
    .status-done     { background: #dcfce7; color: #166534; }
    .status-notdone  { background: #fee2e2; color: #991b1b; }

    .datetime-inputs { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }

    .datetime-inputs input {
      border: 1px solid #e6edf2;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      color: #172033;
      background: #f8fafc;
      outline: none;
    }

    .datetime-inputs input[type="date"] { width: 136px; }
    .datetime-inputs input[type="time"] { width: 100px; }
    .datetime-inputs input:focus { border-color: #0d2b45; background: #fff; }

    .row-notice { font-size: 11px; margin-top: 4px; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }

    .spinner-dark {
      border-color: rgba(13,43,69,0.2);
      border-top-color: #0d2b45;
    }

    .empty { text-align: center; padding: 48px 24px; color: #94a3b8; font-size: 15px; }

    .notice {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .notice-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .notice-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

    /* score tab */
    .score-num { width: 70px; padding: 7px 10px; font-size: 13px; border: 1px solid #e6edf2; border-radius: 8px; outline: none; background: #f8fafc; }
    .score-num:focus { border-color: #0d2b45; background: #fff; }
    .url-input { width: 100%; min-width: 140px; max-width: 200px; padding: 7px 10px; font-size: 12px; border: 1px solid #e6edf2; border-radius: 8px; outline: none; background: #f8fafc; }
    .url-input:focus { border-color: #0d2b45; background: #fff; }

    /* rankings */
    .rank-controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
    .rank-controls select { border: 1px solid #e6edf2; border-radius: 9px; padding: 9px 14px; font-size: 14px; background: #fff; outline: none; }
    .rank-controls select:focus { border-color: #0d2b45; }

    .rank-list { display: flex; flex-direction: column; gap: 10px; }

    .rank-card {
      background: #fff;
      border: 1px solid #eadfca;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .rank-num { font-size: 20px; font-weight: bold; color: #0d2b45; min-width: 36px; text-align: center; }
    .rank-num.gold   { color: #b45309; }
    .rank-num.silver { color: #64748b; }
    .rank-num.bronze { color: #92400e; }
    .rank-info { flex: 1; }
    .rank-name { font-weight: bold; font-size: 15px; }
    .rank-email { font-size: 12px; color: #64748b; }
    .rank-slot { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .rank-score { font-size: 26px; font-weight: bold; color: #0d2b45; min-width: 48px; text-align: right; }
    .rank-score.no-score { font-size: 14px; color: #94a3b8; }
    .notes-link a { font-size: 12px; color: #2563eb; text-decoration: none; }
    .notes-link a:hover { text-decoration: underline; }

    /* modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      max-width: 660px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 16px;
    }

    .modal-title { font-size: 18px; font-weight: bold; color: #0d2b45; }
    .modal-sub { font-size: 13px; color: #94a3b8; margin-top: 3px; }

    .modal-close {
      background: #f1f5f9;
      border: none;
      border-radius: 8px;
      width: 32px; height: 32px;
      font-size: 18px;
      cursor: pointer;
      color: #64748b;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .modal-close:hover { background: #e2e8f0; }

    .modal-meet {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 24px;
    }

    .modal-meet .meet-url { font-size: 13px; color: #2563eb; word-break: break-all; flex: 1; }
    .modal-meet .meet-label { font-size: 12px; font-weight: bold; color: #1e40af; margin-bottom: 2px; }

    .qa-block { margin-bottom: 20px; }
    .qa-q { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .qa-a { font-size: 14px; color: #172033; line-height: 1.65; background: #f8fafc; border-radius: 10px; padding: 12px 16px; white-space: pre-wrap; }
    .qa-a.empty-answer { color: #94a3b8; font-style: italic; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .meta-item { background: #f8fafc; border-radius: 10px; padding: 10px 14px; }
    .meta-label { font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
    .meta-val { font-size: 13px; color: #172033; font-weight: bold; }

    @media (max-width: 768px) {
      table { display: block; overflow-x: auto; }
      header { padding: 12px 16px; }
      .container { padding: 14px 8px; }
      .meta-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <img src="https://upnmxdgqdkvgzfwqaicb.supabase.co/storage/v1/object/public/resala-logo/Resala%20Logo%20-%20source.png" alt="" onerror="this.style.display='none'">
  <div class="htext">
    <h1>Resala AUC Admin</h1>
    <span>Recruitment Dashboard</span>
  </div>
  <div class="spacer"></div>
  <button class="logout-btn" onclick="logout()">Sign out</button>
</header>

<div class="container">
  <div id="global-notice"></div>

  <div id="page-loading" class="page-loading">
    <div class="big-spinner"></div>
    <span>Loading recruitment data…</span>
  </div>

  <div id="content" style="display:none;">
    <div class="tabs">
      <button class="tab-btn active" data-tab="reservations" onclick="switchTab(this,'reservations')">Reservations</button>
      <button class="tab-btn" data-tab="score" onclick="switchTab(this,'score')">Score &amp; Rank</button>
    </div>

    <!-- ── RESERVATIONS TAB ── -->
    <div class="tab-panel active" id="tab-reservations">
      <div class="card">
        <div class="card-head">
          <div>
            <h2>Interview Reservations</h2>
            <div class="count" id="res-count"></div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="refresh()">↺ Refresh</button>
        </div>
        <div class="filter-bar">
          <input id="res-search" placeholder="Search name, email, role…" oninput="filterRes()">
        </div>
        <table>
          <thead>
            <tr>
              <th>Applicant</th>
              <th>Role</th>
              <th>Interview</th>
              <th>Status</th>
              <th>Reschedule</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="res-body"></tbody>
        </table>
        <div id="res-empty" class="empty" style="display:none;">No reservations found.</div>
      </div>
    </div>

    <!-- ── SCORE TAB ── -->
    <div class="tab-panel" id="tab-score">
      <div class="card">
        <div class="card-head">
          <div>
            <h2>Score Applicants</h2>
            <div class="count" id="app-count"></div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="refresh()">↺ Refresh</button>
        </div>
        <div class="filter-bar">
          <input id="score-search" placeholder="Search name, email, role…" oninput="filterScore()">
        </div>
        <table>
          <thead>
            <tr>
              <th>Applicant</th>
              <th>1st Preference</th>
              <th>2nd Preference</th>
              <th>Slot</th>
              <th>1st Score</th>
              <th>2nd Score</th>
              <th>Notes Doc</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="score-body"></tbody>
        </table>
        <div id="score-empty" class="empty" style="display:none;">No applicants found.</div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Rankings by Role</h2></div>
        <div style="padding:20px 24px;">
          <div class="rank-controls">
            <select id="rank-role">
              <option value="">Select a role…</option>
              <option>Treasurer</option>
              <option>Tech Director</option>
              <option>Operations</option>
              <option>Branding / Media</option>
              <option>HR</option>
              <option>PR / Fundraising</option>
              <option>Visits</option>
              <option>Children Day Director</option>
              <option>Mothers Day Director</option>
              <option>Initiatives Director</option>
            </select>
            <select id="rank-pref">
              <option value="first">By 1st preference score</option>
              <option value="second">By 2nd preference score</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="renderRankings()">Show</button>
          </div>
          <div id="rank-list" class="rank-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Answers modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-name"></div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-meet-section"></div>
    <div class="meta-grid" id="modal-meta"></div>
    <div id="modal-answers"></div>
  </div>
</div>

<script>
  const ENDPOINT = window.RESALA_APPLICATIONS_ENDPOINT || '';
  let allReservations = [];
  let allApplicants   = [];

  // ── auth ───────────────────────────────────────────────────────────────────

  function getSecret() { return sessionStorage.getItem('adminSecret') || ''; }

  function logout() {
    sessionStorage.removeItem('adminSecret');
    sessionStorage.removeItem('adminLoadCache');
    window.location.href = 'index.html';
  }

  // ── boot ───────────────────────────────────────────────────────────────────

  window.addEventListener('DOMContentLoaded', async () => {
    const secret = getSecret();
    if (!secret) { window.location.href = 'index.html'; return; }

    // Use cached reservation load from login if fresh
    const cache = (() => { try { return JSON.parse(sessionStorage.getItem('adminLoadCache') || 'null'); } catch { return null; } })();
    sessionStorage.removeItem('adminLoadCache');

    if (cache) {
      allReservations = cache.reservations ?? [];
      renderResTable(allReservations);
      document.getElementById('res-count').textContent = countLabel(allReservations.length, 'reservation');
    }

    try {
      const [resData, appData] = await Promise.all([
        cache ? Promise.resolve(null) : apiFetch({ mode: 'admin-load' }),
        apiFetch({ mode: 'admin-load-applicants' })
      ]);

      if (resData) {
        allReservations = resData.reservations ?? [];
        renderResTable(allReservations);
        document.getElementById('res-count').textContent = countLabel(allReservations.length, 'reservation');
      }

      allApplicants = appData.applicants ?? [];
      renderScoreTable(allApplicants);
      document.getElementById('app-count').textContent = countLabel(allApplicants.length, 'applicant');

    } catch (err) {
      if (/unauthorized/i.test(err.message)) { logout(); return; }
      showNotice(err.message, 'error');
    }

    document.getElementById('page-loading').style.display = 'none';
    document.getElementById('content').style.display = '';
  });

  async function refresh() {
    document.getElementById('page-loading').style.display = '';
    document.getElementById('content').style.display = 'none';
    document.getElementById('global-notice').innerHTML = '';
    try {
      const [resData, appData] = await Promise.all([
        apiFetch({ mode: 'admin-load' }),
        apiFetch({ mode: 'admin-load-applicants' })
      ]);
      allReservations = resData.reservations ?? [];
      allApplicants   = appData.applicants ?? [];
      renderResTable(allReservations);
      renderScoreTable(allApplicants);
      document.getElementById('res-count').textContent   = countLabel(allReservations.length, 'reservation');
      document.getElementById('app-count').textContent   = countLabel(allApplicants.length, 'applicant');
    } catch (err) {
      showNotice(err.message, 'error');
    } finally {
      document.getElementById('page-loading').style.display = 'none';
      document.getElementById('content').style.display = '';
    }
  }

  // ── api ────────────────────────────────────────────────────────────────────

  async function apiFetch(body) {
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8', 'x-admin-reset-secret': getSecret() },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok || data.ok === false) throw new Error(data.error || 'Request failed.');
    return data;
  }

  // ── helpers ────────────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function countLabel(n, word) { return `${n} ${word}${n !== 1 ? 's' : ''}`; }

  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function statusBadge(val) {
    const v = String(val || '').toLowerCase();
    if (v === 'done') return `<span class="status-badge status-done">Done</span>`;
    if (v === 'not done') return `<span class="status-badge status-notdone">Not done</span>`;
    return `<span class="status-badge status-pending">${escHtml(val || 'Pending')}</span>`;
  }

  function normalize(s) { return String(s ?? '').trim().toLowerCase(); }

  function showNotice(msg, type = 'error') {
    document.getElementById('global-notice').innerHTML =
      `<div class="notice notice-${type}">${escHtml(msg)}</div>`;
  }

  function showRowNotice(id, msg, color) {
    const el = document.getElementById(`rn-${id}`);
    if (el) { el.style.color = color; el.textContent = msg; }
  }

  // ── tabs ───────────────────────────────────────────────────────────────────

  function switchTab(btn, name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  // ── reservations tab ───────────────────────────────────────────────────────

  function renderResTable(rows) {
    const tbody = document.getElementById('res-body');
    const empty = document.getElementById('res-empty');
    if (!rows.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';
    tbody.innerHTML = rows.map(r => {
      const hasMeet = !!(r.meetLink);
      return `
        <tr id="res-row-${r.rowIndex}">
          <td>
            <div class="name">${escHtml(r.fullName)}</div>
            <div class="meta">${escHtml(r.aucEmail)}</div>
            <div class="meta">${escHtml(r.studentId)}</div>
          </td>
          <td>
            <div class="role-main">${escHtml(r.roleAppliedFor)}</div>
            <div class="role-second">2nd: ${escHtml(r.secondPreference || '—')}</div>
          </td>
          <td style="min-width:170px;">
            <div><span class="slot-badge">${escHtml(r.slotLabel || r.slotId || '—')}</span></div>
            ${hasMeet
              ? `<a class="meet-btn" href="${escHtml(r.meetLink)}" target="_blank" rel="noopener">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14"/><rect x="1" y="6" width="14" height="12" rx="2"/></svg>
                  Join Meet
                </a>`
              : `<span class="meet-btn no-link">No Meet link</span>`
            }
          </td>
          <td>${statusBadge(r.interviewStatus)}</td>
          <td style="min-width:230px;">
            <div class="datetime-inputs">
              <input type="date" id="new-date-${r.rowIndex}" min="${todayStr()}" value="${todayStr()}">
              <input type="time" id="new-time-${r.rowIndex}" value="15:00">
            </div>
            <button class="btn btn-accent btn-sm" id="res-btn-${r.rowIndex}" onclick="reschedule(${r.rowIndex})">Reschedule</button>
            <div class="row-notice" id="rn-${r.rowIndex}"></div>
          </td>
          <td>
            <button class="view-btn" onclick="openModal(${r.rowIndex})">View answers</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function filterRes() {
    const q = document.getElementById('res-search').value.toLowerCase();
    const rows = q
      ? allReservations.filter(r =>
          normalize(r.fullName).includes(q) ||
          normalize(r.aucEmail).includes(q) ||
          normalize(r.roleAppliedFor).includes(q))
      : allReservations;
    renderResTable(rows);
    document.getElementById('res-count').textContent = `${rows.length} of ${allReservations.length} reservations`;
  }

  async function reschedule(rowIndex) {
    const date = document.getElementById(`new-date-${rowIndex}`)?.value;
    const time = document.getElementById(`new-time-${rowIndex}`)?.value;
    if (!date || !time) { showRowNotice(rowIndex, 'Pick date and time.', '#991b1b'); return; }

    const btn = document.getElementById(`res-btn-${rowIndex}`);
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-dark"></span>';

    try {
      const data = await apiFetch({ mode: 'admin-reschedule', reservationRowIndex: rowIndex, date, startTime: time });
      const parts = [];
      if (data.deletedOldEvent) parts.push('old event deleted');
      if (data.createdNewEvent) parts.push('new event created');
      if (data.emailSent) parts.push('email sent');
      showRowNotice(rowIndex, '✓ ' + (parts.join(' · ') || 'Done'), '#166534');
      setTimeout(() => refresh(), 1400);
    } catch (err) {
      showRowNotice(rowIndex, err.message, '#991b1b');
      btn.disabled = false;
      btn.textContent = 'Reschedule';
    }
  }

  // ── answers modal ──────────────────────────────────────────────────────────

  function openModal(rowIndex) {
    const r = allReservations.find(x => x.rowIndex === rowIndex);
    if (!r) return;

    document.getElementById('modal-name').textContent = r.fullName;
    document.getElementById('modal-sub').textContent = `${r.roleAppliedFor} · ${r.aucEmail}`;

    // Meet section
    const meetHtml = r.meetLink
      ? `<div class="modal-meet">
          <div style="flex:1">
            <div class="meet-label">Google Meet link</div>
            <div class="meet-url">${escHtml(r.meetLink)}</div>
          </div>
          <a class="meet-btn" href="${escHtml(r.meetLink)}" target="_blank" rel="noopener">Join Meet</a>
        </div>`
      : '';
    document.getElementById('modal-meet-section').innerHTML = meetHtml;

    // Meta grid
    const metas = [
      { label: 'Student ID', val: r.studentId },
      { label: 'Major', val: r.major },
      { label: 'Year / Level', val: r.yearLevel },
      { label: 'Phone', val: r.phone },
      { label: 'Interview Slot', val: r.slotLabel || r.slotId },
      { label: 'Status', val: r.interviewStatus || 'Pending' }
    ];
    document.getElementById('modal-meta').innerHTML = metas.map(m =>
      `<div class="meta-item"><div class="meta-label">${escHtml(m.label)}</div><div class="meta-val">${escHtml(m.val || '—')}</div></div>`
    ).join('');

    // Q&A
    const qas = [
      { q: 'Why this role?', a: r.whyThisRole },
      { q: 'Why choose yourself?', a: r.whyChooseYourself },
      { q: 'What do you hope to learn?', a: r.hopeToLearn },
      { q: 'Previous Resala experience?', a: r.previousResalaExperience }
    ];
    document.getElementById('modal-answers').innerHTML = qas.map(qa =>
      `<div class="qa-block">
        <div class="qa-q">${escHtml(qa.q)}</div>
        <div class="qa-a ${qa.a ? '' : 'empty-answer'}">${qa.a ? escHtml(qa.a) : 'No answer provided.'}</div>
      </div>`
    ).join('');

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── score tab ──────────────────────────────────────────────────────────────

  function renderScoreTable(rows) {
    const tbody = document.getElementById('score-body');
    const empty = document.getElementById('score-empty');
    if (!rows.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';
    tbody.innerHTML = rows.map(r => `
      <tr id="score-row-${r.rowIndex}">
        <td>
          <div class="name">${escHtml(r.fullName)}</div>
          <div class="meta">${escHtml(r.aucEmail)}</div>
        </td>
        <td><div class="role-main">${escHtml(r.roleAppliedFor)}</div></td>
        <td><div class="role-second">${escHtml(r.secondPreference || '—')}</div></td>
        <td><span class="slot-badge" style="font-size:11px;">${escHtml(r.interviewSlot || '—')}</span></td>
        <td><input type="number" class="score-num" id="s1-${r.rowIndex}" min="0" max="100" step="0.5" value="${escHtml(r.firstPreferenceScore)}" placeholder="—"></td>
        <td><input type="number" class="score-num" id="s2-${r.rowIndex}" min="0" max="100" step="0.5" value="${escHtml(r.secondPreferenceScore)}" placeholder="—"></td>
        <td><input type="url" class="url-input" id="notes-${r.rowIndex}" value="${escHtml(r.notesUrl)}" placeholder="Paste doc URL"></td>
        <td>
          <button class="btn btn-primary btn-sm" id="save-btn-${r.rowIndex}" onclick="saveScore(${r.rowIndex},'${escHtml(r.aucEmail)}')">Save</button>
          <div class="row-notice" id="rn-${r.rowIndex}"></div>
        </td>
      </tr>
    `).join('');
  }

  function filterScore() {
    const q = document.getElementById('score-search').value.toLowerCase();
    const rows = q
      ? allApplicants.filter(r =>
          normalize(r.fullName).includes(q) ||
          normalize(r.aucEmail).includes(q) ||
          normalize(r.roleAppliedFor).includes(q))
      : allApplicants;
    renderScoreTable(rows);
    document.getElementById('app-count').textContent = `${rows.length} of ${allApplicants.length} applicants`;
  }

  async function saveScore(rowIndex, aucEmail) {
    const notesUrl            = document.getElementById(`notes-${rowIndex}`)?.value.trim() ?? '';
    const firstPreferenceScore  = document.getElementById(`s1-${rowIndex}`)?.value.trim() ?? '';
    const secondPreferenceScore = document.getElementById(`s2-${rowIndex}`)?.value.trim() ?? '';
    const btn = document.getElementById(`save-btn-${rowIndex}`);
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      await apiFetch({ mode: 'admin-update-score', aucEmail, notesUrl, firstPreferenceScore, secondPreferenceScore });
      const app = allApplicants.find(a => a.rowIndex === rowIndex);
      if (app) { app.notesUrl = notesUrl; app.firstPreferenceScore = firstPreferenceScore; app.secondPreferenceScore = secondPreferenceScore; }
      showRowNotice(rowIndex, '✓ Saved', '#166534');
    } catch (err) {
      showRowNotice(rowIndex, err.message, '#991b1b');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save';
    }
  }

  // ── rankings ───────────────────────────────────────────────────────────────

  function renderRankings() {
    const role = document.getElementById('rank-role').value;
    const pref = document.getElementById('rank-pref').value;
    const container = document.getElementById('rank-list');
    if (!role) { container.innerHTML = '<p style="color:#94a3b8;font-size:14px;">Select a role above.</p>'; return; }

    const filtered = allApplicants.filter(a =>
      pref === 'second'
        ? normalize(a.secondPreference) === normalize(role)
        : normalize(a.roleAppliedFor) === normalize(role)
    );

    const scoreKey = pref === 'second' ? 'secondPreferenceScore' : 'firstPreferenceScore';
    const sorted = [...filtered].sort((a, b) => (parseFloat(b[scoreKey]) || -Infinity) - (parseFloat(a[scoreKey]) || -Infinity));

    if (!sorted.length) {
      container.innerHTML = `<p style="color:#94a3b8;font-size:14px;">No applicants with ${role} as ${pref === 'first' ? '1st' : '2nd'} preference.</p>`;
      return;
    }

    const cls = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';

    container.innerHTML = sorted.map((a, i) => {
      const score = a[scoreKey];
      const hasScore = score !== '' && score != null;
      return `
        <div class="rank-card">
          <div class="rank-num ${cls(i)}">#${i + 1}</div>
          <div class="rank-info">
            <div class="rank-name">${escHtml(a.fullName)}</div>
            <div class="rank-email">${escHtml(a.aucEmail)}</div>
            <div class="rank-slot">${escHtml(a.interviewSlot || 'No slot')}</div>
            <div class="role-second" style="margin-top:3px;">1st: ${escHtml(a.roleAppliedFor)} · 2nd: ${escHtml(a.secondPreference || '—')}</div>
            ${a.notesUrl ? `<div class="notes-link"><a href="${escHtml(a.notesUrl)}" target="_blank" rel="noopener">📄 Interview notes</a></div>` : ''}
          </div>
          <div class="rank-score ${hasScore ? '' : 'no-score'}">${hasScore ? escHtml(String(score)) : '—'}</div>
        </div>
      `;
    }).join('');
  }
</script>
</body>
</html>
